            }
            .staticrypt-page{
                position:relative;z-index:1;
                min-height:100%;display:flex;align-items:center;justify-content:center;
                padding:24px;box-sizing:border-box;
            }
            .staticrypt-form{
                width:100%;max-width:380px;box-sizing:border-box;
                background:linear-gradient(180deg, rgba(11,34,68,.85), rgba(8,26,51,.85));
                border:1px solid var(--br);border-radius:20px;
                padding:36px 30px;text-align:center;
                box-shadow:0 24px 60px -28px rgba(0,0,0,.8), 0 0 0 1px rgba(143,180,224,.06);
                backdrop-filter:blur(6px);
            }
            .cgibs-badge{
                display:inline-block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
                color:var(--gold);border:1px solid rgba(233,185,73,.4);border-radius:999px;
                padding:5px 14px;margin-bottom:18px;font-weight:600;
            }
            .staticrypt-title{
                font-family:"Space Grotesk","Inter",sans-serif;
                font-size:1.45em;line-height:1.2;color:var(--ink);font-weight:600;margin:0 0 6px;
            }
            .staticrypt-instructions p:last-child{color:var(--muted);font-size:.9em;margin:0}
            .cgibs-eq{margin:14px 0 4px;font-family:"Space Grotesk","Inter",sans-serif;
                font-size:.95em;color:var(--txt)}
            .cgibs-eq b{color:var(--gold)}
            .staticrypt-hr{margin:22px 0;border:0;border-top:1px solid var(--br)}
            .staticrypt-password-container{
                position:relative;background:rgba(255,255,255,.06);
                border:1px solid var(--br);border-radius:12px;
                width:100%;margin:0 0 14px;box-sizing:border-box;overflow:hidden;
            }
            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"]{
                background:transparent;border:0;color:var(--ink);
                box-sizing:border-box;font-size:15px;outline:0;
                padding:15px 44px 15px 16px;width:100%;font-family:inherit;
            }
            .staticrypt-form input::placeholder{color:var(--muted)}
            .staticrypt-toggle-password-visibility{
                cursor:pointer;height:20px;width:20px;opacity:.6;padding:13px;
                position:absolute;right:0;top:50%;transform:translateY(-50%);
                filter:invert(78%) sepia(12%) saturate(700%) hue-rotate(175deg);
            }
            .staticrypt-form .staticrypt-decrypt-button{
                text-transform:uppercase;letter-spacing:.06em;outline:0;
                background:linear-gradient(180deg,var(--gold-s),var(--gold));
                width:100%;border:0;border-radius:12px;padding:15px;
                color:#3a2c05;font-size:14px;font-weight:700;cursor:pointer;
                transition:filter .15s ease, transform .05s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus{filter:brightness(1.06)}
            .staticrypt-form .staticrypt-decrypt-button:active{transform:translateY(1px)}
            label.staticrypt-remember{
                display:flex;align-items:center;justify-content:center;gap:10px;
                margin:2px 0 16px;color:var(--muted);font-size:.88em;cursor:pointer;
            }
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.3);accent-color:var(--gold)}
            .cgibs-foot{margin-top:18px;font-size:.72em;color:var(--muted);letter-spacing:.02em}
            .hidden{display:none !important}
            .staticrypt-spinner-container{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg)}
            .staticrypt-spinner{
                display:inline-block;width:2rem;height:2rem;

                border-radius:50%;animation:spinner-border .75s linear infinite;
            }
            @keyframes spinner-border{100%{transform:rotate(360deg)}}
            @media screen and (-webkit-min-device-pixel-ratio:0){
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"]{font-size:16px}
            }
